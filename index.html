<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qeyafa Vision for Artificial Intelligence</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #070f0d;
            color: #ffffff;
            text-align: center;
        }
        .container {
            padding: 20px;
            border: 1px solid rgba(197, 160, 101, 0.3);
            border-radius: 16px;
            background: rgba(16, 22, 21, 0.8);
            backdrop-filter: blur(10px);
            max-width: 90%;
        }
        h1 {
            color: #C5A065;
            font-size: 2.5rem;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }
        p {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.8);
            margin: 10px 0;
        }
        .highlight {
            color: #115E59;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Qeyafa Vision for Artificial Intelligence</h1>
        <p>Based in Riyadh, Kingdom of Saudi Arabia</p>
        <p class="highlight">AI-Powered Fashion Tech</p>
    </div>
</body>
</html>
